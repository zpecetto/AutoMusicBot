version: "3.8"

volumes:
  n8n_data:
    name: automusic_n8n_data

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: automusic_n8n
    restart: always
    privileged: true
    ports:
      - "5678:5678"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - N8N_SECURE_COOKIE=false
      - WEBHOOK_URL=https://VOTRE_URL_NGROK.ngrok-free.dev/ # ⚠️ À modifier avec votre propre URL
      - N8N_BLOCK_BROWSER_NAME_CHECK=true
      - N8N_COMMAND_EXECUTION_ENABLED=true
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - GENERIC_TIMEZONE=Europe/Paris
    volumes:
      - n8n_data:/home/node/.n8n
      - ./Musique:/home/node/.n8n-files # Crée un dossier "Musique" dans le répertoire courant
    depends_on:
      - browserless

  # Navigateur fantôme
  browserless:
    image: ghcr.io/browserless/chromium:latest
    container_name: automusic_browserless
    restart: always
    ports:
      - "3000:3000"
    environment:
      # Optimisé pour Raspberry Pi 5 (16Go RAM)
      - MAX_CONCURRENT_SESSIONS=5 
      - MAX_QUEUE_LENGTH=10

  # Mises à jour automatiques
  watchtower:
    image: containrrr/watchtower
    container_name: automusic_watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true